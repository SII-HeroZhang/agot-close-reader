name: Deploy static reader to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: site/requirements.txt

      - name: Install build dependencies
        run: python -m pip install -r site/requirements.txt

      - name: Build the static site
        env:
          BASE_PATH: /agot-close-reader
          SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
          REPOSITORY_URL: https://github.com/${{ github.repository }}
        run: python site/build.py

      - name: Audit routes, content, and links
        env:
          BASE_PATH: /agot-close-reader
        run: python site/audit_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
